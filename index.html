<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 📊 Chart.js -->

    <!-- 🔥 Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #1a1a1a; --bg-card: #242424;
            --text-primary: #ffffff; --text-secondary: #a0a0a0;
            --accent: #ff3366; --accent-hover: #ff1a4d; --success: #00d084; --border: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; min-height: 100vh;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./images/background.jpg'); background-size: cover;
            background-position: center; opacity: 0.1; z-index: -1;
        }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .landing {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 40px 20px; text-align: center;
        }
        .logo {
            font-size: 4.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 20px; letter-spacing: -3px;
        }
        .landing h1 { font-size: 2.2rem; margin-bottom: 15px; font-weight: 700; }
        .landing p { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 50px; }
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn {
            background: var(--accent); color: white; border: none; padding: 16px 40px;
            font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(255, 51, 102, 0.3);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 51, 102, 0.4); background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-card); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .btn-secondary:hover { box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); }
        .nav {
            position: fixed; top: 0; left: 0; right: 0; backdrop-filter: blur(20px);
            padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-size: 1.8rem; font-weight: 900; color: var(--accent); cursor: pointer; }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none; font-weight: 500;
            transition: all 0.3s; padding: 8px 16px; border-radius: 20px; font-size: 0.95rem;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); background: var(--bg-card); }
        .container { max-width: 500px; margin: 0 auto; padding: 100px 20px 40px; min-height: 100vh; }
        .question-feed {
            position: relative; height: calc(100vh - 180px); overflow-y: auto;
            scroll-snap-type: y mandatory; scrollbar-width: none; padding-bottom: 80px;
        }
        .question-feed::-webkit-scrollbar { display: none; }
        .question-card {
            min-height: calc(100vh - 220px); background: var(--bg-card); border-radius: 24px;
            padding: 30px 25px; margin-bottom: 25px; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }
        .question-header { text-align: center; margin-bottom: 30px; }
        .question-emoji { font-size: 4.5rem; margin-bottom: 20px; display: block; }
        .question-text { font-size: 1.6rem; font-weight: 700; line-height: 1.4; color: var(--text-primary); }
        .question-number {
            display: inline-block; background: var(--accent); color: white;
            padding: 5px 15px; border-radius: 20px; font-size: 0.85rem;
            font-weight: 600; margin-bottom: 15px;
        }
        .question-hint {
            text-align: center; color: var(--text-secondary); font-size: 0.9rem;
            margin-top: 15px; padding: 8px 12px; background: var(--bg-secondary);
            border-radius: 12px; border: 1px dashed var(--border);
        }
        .friends-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .friend-card {
            background: var(--bg-secondary); border-radius: 16px; padding: 20px 15px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
            border: 2px solid transparent; position: relative;
        }
        .friend-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 25px rgba(255, 51, 102, 0.2); }
        .friend-card.voted { border-color: var(--success); background: rgba(0, 208, 132, 0.1); }
        .friend-card.voted::after {
            content: '✓'; position: absolute; top: 8px; right: 8px;
            width: 24px; height: 24px; background: var(--success);
            color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: 700;
        }
        .friend-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; overflow: hidden; flex-shrink: 0;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .friend-avatar .avatar-initial, .leader-avatar .avatar-initial {
            font-weight: 700; color: white; line-height: 1;
        }
        .friend-avatar .avatar-initial { font-size: 1.8rem; }
        .friend-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
        .vote-submit-section { scroll-snap-align: start; padding: 10px 0 48px; }
        .vote-submit-card {
            background: var(--bg-card); border-radius: 24px; padding: 28px 22px;
            border: 1px solid var(--border); text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        .vote-submit-hint { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 18px; line-height: 1.45; }
        .vote-submit-status { margin-top: 14px; font-size: 0.9rem; min-height: 1.3em; color: var(--text-secondary); }
        .vote-submit-status.ok { color: var(--success); }
        .vote-submit-status.err { color: #ff6b6b; }
        .vote-submit-btn:disabled { opacity: 0.65; cursor: wait; transform: none; }
        .swipe-indicator {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); padding: 12px 25px; border-radius: 30px;
            display: flex; align-items: center; gap: 10px; color: var(--text-secondary);
            font-size: 0.9rem; font-weight: 500; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border); animation: bounce 2s ease infinite; z-index: 100;
        }
        .swipe-indicator svg { width: 20px; height: 20px; }
        .admin-panel { display: none; }
        .admin-login {
            max-width: 400px; margin: 80px auto; background: var(--bg-card);
            padding: 40px 30px; border-radius: 24px; border: 1px solid var(--border);
        }
        .admin-login h2 { text-align: center; margin-bottom: 30px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 14px 18px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text-primary); font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 25px 20px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
        .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
        .admin-section { background: var(--bg-card); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); }
        .admin-section h3 { margin-bottom: 20px; font-size: 1.3rem; }
        .vote-list { max-height: 400px; overflow-y: auto; }
        .vote-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .vote-item:last-child { border-bottom: none; }
        .vote-question { font-weight: 600; margin-bottom: 5px; }
        .vote-stats { color: var(--text-secondary); font-size: 0.85rem; }
        .reset-btn { background: #ff4444; width: 100%; margin-top: 10px; }
        .reset-btn:hover { background: #cc0000; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-8px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }
        @media (max-width: 768px) {
            .logo { font-size: 3.5rem; } .landing h1 { font-size: 1.6rem; } .landing p { font-size: 1rem; }
            .btn { padding: 14px 30px; font-size: 1rem; } .question-text { font-size: 1.4rem; }
            .question-emoji { font-size: 3.5rem; } .friends-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .friend-card { padding: 18px 12px; } .friend-avatar { width: 50px; height: 50px; }
            .friend-avatar .avatar-initial { font-size: 1.5rem; } .container { padding: 90px 15px 40px; }
            .nav-links a { padding: 6px 12px; font-size: 0.85rem; }
        }
        .hidden { display: none !important; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .emoji-reaction {
            position: fixed; font-size: 2.5rem; pointer-events: none;
            animation: floatUp 1s ease forwards; z-index: 9999;
        }
        .admin-badge {
            background: var(--accent); color: white; padding: 3px 10px;
            border-radius: 12px; font-size: 0.75rem; font-weight: 700; margin-left: 8px;
        }
        #connectionStatus {
            position: fixed; top: 70px; right: 20px; padding: 8px 16px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 500; z-index: 999; display: none;
        }
        #connectionStatus.connected { background: var(--success); color: #000; display: block; }
        #connectionStatus.disconnected { background: #ff6b6b; color: white; display: block; }
        
        /* 📊 Chart Styles */
        .chart-container { background: var(--bg-secondary); border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
        .chart-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
        .chart-wrapper { position: relative; height: 280px; width: 100%; }
        .chart-legend { margin-top: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--text-secondary); }
        .legend-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
        .legend-value { margin-left: auto; font-weight: 600; color: var(--text-primary); }
        .empty-chart-msg { text-align: center; color: var(--text-secondary); padding: 40px 0; }
        
        /* Leaderboard */
        .leader-item { display: flex; align-items: center; padding: 18px 20px; background: var(--bg-card); border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
        .leader-rank { font-size: 1.5rem; font-weight: 900; margin-right: 15px; width: 35px; text-align: center; }
        .leader-rank.gold { color: #FFD700; } .leader-rank.silver { color: #C0C0C0; } .leader-rank.bronze { color: #CD7F32; }
        .leader-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #ff6b6b); display: flex; align-items: center; justify-content: center; margin-right: 15px; overflow: hidden; flex-shrink: 0; }
        .leader-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .leader-avatar .avatar-initial { font-size: 1.25rem; }
        .leader-info { flex: 1; } .leader-name { font-weight: 600; margin-bottom: 4px; font-size: 1rem; }
        .leader-votes { color: var(--text-secondary); font-size: 0.85rem; } .leader-score { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    </style>
</head>

    <script>
        // 🔥 Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBGTPmuwsIne5nFv5qcqgp3SLBFd31fLV4",
            authDomain: "garret-9cbae.firebaseapp.com",
            databaseURL: "https://garret-9cbae-default-rtdb.firebaseio.com",
            projectId: "garret-9cbae",
            storageBucket: "garret-9cbae.firebasestorage.app",
            messagingSenderId: "405640770546",
            appId: "1:405640770546:web:dc6046322c95fd44bdf16b",
            measurementId: "G-P762PYMB8L"
        };

        // 🔥 Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 📦 State Management
        let userSelections = {}; // { "1": [5, 12], "2": [3] } - Array of friend IDs per question
        let remoteCounts = {};   // Global counts from Firebase
        let isAdmin = false;
        let questionCharts = {};
        let firebaseInitialized = false;

        // 📋 Data
        const MEMBER_IMG_DIR = 'images/';
        const MAX_SELECTIONS = 2; // 🔥 Allow 2 votes per question
        const friends = [
            { id: 1, name: 'Yesu', image: 'yesu.jpg' }, { id: 2, name: 'Tugsuu', image: 'tugsuu.jpg' },
            { id: 3, name: 'Turuu', image: 'turuu.jpg' }, { id: 4, name: 'Uulaa', image: 'uula.jpg' },
            { id: 5, name: 'Shinee', image: 'shinee.jpg' }, { id: 6, name: 'Maral', image: 'maral.jpg' },
            { id: 7, name: 'Maralgoo', image: 'maralgoo.jpg' }, { id: 8, name: 'Anu jijg', image: 'anu_jijg.jpg' },
            { id: 9, name: 'Anu tom', image: 'anu_tom.jpg' }, { id: 10, name: 'Nomin', image: 'nomin.jpg' },
            { id: 11, name: 'Sender', image: 'sender.jpg' }, { id: 12, name: 'Misheel', image: 'misheel.jpg' },
            { id: 13, name: 'Enguun', image: 'enguun.jpg' }, { id: 14, name: 'Enja', image: 'enja.jpg' }
        ];

        let questions = [
            { id: 1, text: 'Хэн хамгийн хурдан согтдог нь вэ?', emoji: '🍺' },
            { id: 2, text: 'Хэн хамгийн ховдог нь вэ?', emoji: '🍕' },
            { id: 3, text: 'Хэн ex рүүгээ шөнө госту бичих магдлалтай вэ?', emoji: '📱' },
            { id: 4, text: 'Хэн хамгийн хөгжилтэй нь вэ?', emoji: '😂' },
            { id: 5, text: 'Хэн хамгийн dramatic нь вэ?', emoji: '🎭' },
            { id: 6, text: 'Хэн хамгийн хөлдүү нь вэ?', emoji: '🤨' },
            { id: 7, text: 'Group chat-ны буга ?', emoji: '💬' },
            { id: 8, text: 'Хэн хамгийн хэл ам нь гүйцэгдэхээргүй хэрүүлч нь вэ?', emoji: '🤬' },
            { id: 9, text: 'Хэн хамгийн халуухан нь вэ?', emoji: '🫦' },
            { id: 10, text: '24/7 Госту ', emoji: '🍻' },
            { id: 11, text: 'Хэн хамгийн хөөрхөн нь вэ?', emoji: '🌹' },
            { id: 12, text: 'Хэн хамгийн унтамхай нь вэ?', emoji: '😴' }
        ];

        const STORAGE_KEY = 'garret_user_selections';
        const QUESTIONS_KEY = 'garret_questions';

        // 🔹 Utility Functions
        function memberAvatarSrc(friend) {
            const raw = (friend && friend.image) ? String(friend.image) : '';
            const file = raw.replace(/^.*[/\\]/, '').replace(/\.\.[\\/]/g, '');
            return file ? MEMBER_IMG_DIR + encodeURIComponent(file) : '';
        }
        function memberAvatarHtml(friend) {
            const src = memberAvatarSrc(friend);
            if (src) return `<img src="${src}" alt="${friend.name}" loading="lazy">`;
            return `<span class="avatar-initial">${(friend.name || '?')[0].toUpperCase()}</span>`;
        }

        // 💾 Local Storage
        function loadLocalData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // Convert old format (single value) to new format (array)
                    userSelections = {};
                    Object.keys(parsed).forEach(key => {
                        const val = parsed[key];
                        userSelections[key] = Array.isArray(val) ? val : (val != null ? [val] : []);
                    });
                }
                const savedQ = localStorage.getItem(QUESTIONS_KEY);
                if (savedQ) questions = JSON.parse(savedQ);
            } catch (e) { console.warn('Local storage load error', e); }
        }
        function saveLocalData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(userSelections));
            localStorage.setItem(QUESTIONS_KEY, JSON.stringify(questions));
        }

        // 🌐 Firebase Sync
        async function loadQuestions() {
            try {
                const snap = await db.ref('questions').once('value');
                const data = snap.val();
                if (data && Object.keys(data).length > 0) {
                    questions = Object.values(data).sort((a, b) => a.id - b.id);
                } else {
                    questions.forEach(q => db.ref(`questions/${q.id}`).set(q));
                }
                localStorage.setItem(QUESTIONS_KEY, JSON.stringify(questions));
            } catch (e) { console.warn('Failed to load questions', e); }
        }

        async function loadFirebaseVotes() {
            try {
                const snap = await db.ref('votes').once('value');
                const data = snap.val() || {};
                remoteCounts = {};
                questions.forEach(q => {
                    remoteCounts[q.id] = {};
                    friends.forEach(f => remoteCounts[q.id][f.id] = 0);
                });
                Object.keys(data).forEach(key => {
                    const [qId, fId] = key.split('_').map(Number);
                    if (remoteCounts[qId] && remoteCounts[qId][fId] !== undefined) {
                        remoteCounts[qId][fId] = Number(data[key]);
                    }
                });
                updateConnectionStatus(true);
                if (firebaseInitialized) refreshAdminView();
            } catch (err) { console.warn('Firebase load failed', err); updateConnectionStatus(false); }
        }

        function updateConnectionStatus(connected) {
            const el = document.getElementById('connectionStatus');
            el.style.display = 'block';
            el.textContent = connected ? '🟢 Live Sync' : '🔴 Offline';
            el.className = connected ? 'connected' : 'disconnected';
        }

        // 🖥️ UI Rendering
        function showPage(page) {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('mainNav').classList.remove('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            
            if (page === 'landing') {
                document.getElementById('landingPage').classList.remove('hidden');
                document.getElementById('mainNav').classList.add('hidden');
                document.getElementById('mainContainer').classList.add('hidden');
            } else {
                document.getElementById(`${page}Page`).classList.add('active');
                document.getElementById(`nav-${page}`).classList.add('active');
                if (page === 'admin' && isAdmin) refreshAdminView();
            }
        }

        function renderQuestions() {
            const feed = document.getElementById('questionFeed');
            feed.innerHTML = '';
            questions.forEach((q, i) => feed.appendChild(createQuestionCard(q, i)));
            appendSubmitFooter();
        }

        function createQuestionCard(question, index) {
            const selectedFids = userSelections[String(question.id)] || [];
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="question-header">
                    <span class="question-number">Асуулт ${index + 1}</span>
                    <div class="question-emoji">${question.emoji}</div>
                    <div class="question-text">${question.text}</div>
                </div>
                <div class="friends-grid" id="friends-${question.id}">
                    ${friends.map(f => `
                        <div class="friend-card ${selectedFids.includes(f.id) ? 'voted' : ''}" 
                             data-friend-id="${f.id}" onclick="handleVote(${question.id}, ${f.id}, event)">
                            <div class="friend-avatar">${memberAvatarHtml(f)}</div>
                            <div class="friend-name">${f.name}</div>
                        </div>
                    `).join('')}
                </div>
                <div class="question-hint">
                    🔹 Сонголт: <span id="count-${question.id}">${selectedFids.length}</span> / ${MAX_SELECTIONS}
                </div>
            `;
            return card;
        }

        function appendSubmitFooter() {
            const feed = document.getElementById('questionFeed');
            const footer = document.createElement('div');
            footer.className = 'vote-submit-section';
            footer.innerHTML = `
                <div class="vote-submit-card">
                    <p class="vote-submit-hint">Бүх асуултад хариулсны дараа Submit дарна уу.</p>
                    <button type="button" class="btn vote-submit-btn" id="submitVotesBtn">Submit Votes 🚀</button>
                    <p class="vote-submit-status" id="submitVotesStatus"></p>
                </div>`;
            feed.appendChild(footer);
            document.getElementById('submitVotesBtn').addEventListener('click', submitVotes);
        }

        // 🗳️ Voting Logic (Multi-select: up to MAX_SELECTIONS)
        function handleVote(questionId, friendId, event) {
            createEmojiReaction(event.clientX, event.clientY, ['🔥','💯','😂','🎯','✨'][Math.floor(Math.random()*5)]);
            
            const key = String(questionId);
            let selections = userSelections[key] || [];
            
            if (selections.includes(friendId)) {
                // Deselect: remove from array
                selections = selections.filter(id => id !== friendId);
            } else if (selections.length < MAX_SELECTIONS) {
                // Select: add to array (if under limit)
                selections = [...selections, friendId];
            } else {
                // Limit reached - show feedback
                const card = event.currentTarget;
                card.style.animation = 'shake 0.3s ease';
                setTimeout(() => card.style.animation = '', 300);
                return; // Don't save
            }
            
            userSelections[key] = selections;
            saveLocalData();
            updateCardVisuals(questionId);
        }

        function updateCardVisuals(questionId) {
            const container = document.getElementById(`friends-${questionId}`);
            if (!container) return;
            const selectedFids = userSelections[String(questionId)] || [];
            
            // Update checkmarks
            container.querySelectorAll('.friend-card').forEach(card => {
                const fid = Number(card.dataset.friendId);
                card.classList.toggle('voted', selectedFids.includes(fid));
            });
            
            // Update counter
            const counter = document.getElementById(`count-${questionId}`);
            if (counter) counter.textContent = selectedFids.length;
        }

        // 📤 Submit to Firebase (batch increment for all selections)
        async function submitVotes() {
            const btn = document.getElementById('submitVotesBtn');
            const statusEl = document.getElementById('submitVotesStatus');
            if (!btn || !statusEl) return;

            // Count how many questions have at least 1 selection
            const answeredCount = Object.values(userSelections).filter(arr => arr && arr.length > 0).length;
            if (answeredCount < questions.length) {
                if (!confirm(`Та ${questions.length - answeredCount} асуултад сонголт хийгээгүй байна. Үргэлжлүүлэх үү?`)) return;
            }

            btn.disabled = true;
            statusEl.className = 'vote-submit-status';
            statusEl.textContent = 'Илгээж байна...';

            try {
                const updates = {};
                questions.forEach(q => {
                    const fids = userSelections[String(q.id)] || [];
                    fids.forEach(fid => {
                        updates[`${q.id}_${fid}`] = firebase.database.ServerValue.increment(1);
                    });
                });

                if (Object.keys(updates).length > 0) {
                    await db.ref('votes').update(updates);
                }

                statusEl.className = 'vote-submit-status ok';
                statusEl.textContent = '✅ Амжилттай илгээгдлээ!';
                
                // Optional: Clear local after submit
                // userSelections = {}; saveLocalData(); renderQuestions();
            } catch (err) {
                console.error('Submit failed', err);
                statusEl.className = 'vote-submit-status err';
                statusEl.textContent = '❌ Алдаа: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        }

        function createEmojiReaction(x, y, emoji) {
            const el = document.createElement('div');
            el.className = 'emoji-reaction'; el.textContent = emoji;
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // 👑 Admin & Charts Logic
        function adminLogin() {
            if (document.getElementById('adminPassword').value === 'admin123') {
                isAdmin = true;
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                refreshAdminView();
            } else alert('❌ Буруу password!');
        }
        function adminLogout() {
            isAdmin = false;
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
            renderQuestions();
        }

        function getVoteCount(qId, fId) { return remoteCounts[qId]?.[fId] || 0; }

        function refreshAdminView() {
            if (!isAdmin) return;
            let total = 0;
            questions.forEach(q => friends.forEach(f => total += getVoteCount(q.id, f.id)));
            document.getElementById('totalVotes').textContent = total;
            document.getElementById('totalQuestions').textContent = questions.length;
            
            // Leaderboard
            const container = document.getElementById('adminLeaderboard');
            container.innerHTML = '';
            const scores = friends.map(f => ({
                id: f.id, name: f.name, total: questions.reduce((sum, q) => sum + getVoteCount(q.id, f.id), 0)
            })).sort((a,b) => b.total - a.total).slice(0, 5);
            scores.forEach((s, i) => {
                const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
                const item = document.createElement('div'); item.className = 'leader-item';
                item.innerHTML = `
                    <div class="leader-rank ${rankClass}">#${i+1}</div>
                    <div class="leader-avatar">${memberAvatarHtml(friends.find(f=>f.id===s.id))}</div>
                    <div class="leader-info"><div class="leader-name">${s.name}</div><div class="leader-votes">${s.total} vote авсан</div></div>
                    <div class="leader-score">${s.total}</div>`;
                container.appendChild(item);
            });

            // Stats List
            const list = document.getElementById('voteList'); list.innerHTML = '';
            questions.forEach(q => {
                let top = '-', max = 0;
                friends.forEach(f => { const c = getVoteCount(q.id, f.id); if(c>max){max=c;top=f.name;} });
                list.innerHTML += `<div class="vote-item"><div><div class="vote-question">${q.emoji} ${q.text}</div><div class="vote-stats">${max} votes - Top: ${top}</div></div></div>`;
            });

            // Charts
            renderQuestionCharts();
        }

        function renderQuestionCharts() {
            const container = document.getElementById('questionCharts');
            container.innerHTML = '';
            questionCharts = {};
            
            questions.forEach(q => {
                const votes = {};
                let total = 0;
                friends.forEach(f => {
                    const count = getVoteCount(q.id, f.id);
                    if (count > 0) { votes[f.name] = count; total += count; }
                });
                
                const div = document.createElement('div'); div.className = 'chart-container';
                div.innerHTML = `
                    <div class="chart-title">${q.emoji} ${q.text}</div>
                    ${total > 0 ? `
                        <div class="chart-wrapper"><canvas id="chart-${q.id}"></canvas></div>
                        <div class="chart-legend" id="legend-${q.id}"></div>
                    ` : `<div class="empty-chart-msg">Санал өгөөгүй байна 📭</div>`}
                `;
                container.appendChild(div);
                
                if (total > 0) createPieChart(q.id, votes, total);
            });
        }

        function createPieChart(qId, data, total) {
            const ctx = document.getElementById(`chart-${qId}`).getContext('2d');
            const legend = document.getElementById(`legend-${qId}`);
            const labels = Object.keys(data);
            const values = Object.values(data);
            const colors = labels.map((_, i) => `hsla(${(i * 137.508) % 360}, 70%, 60%, 0.8)`);
            
            if (questionCharts[qId]) questionCharts[qId].destroy();
            
            questionCharts[qId] = new Chart(ctx, {
                type: 'doughnut',
                data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, hoverOffset: 10 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                    animation: { animateScale: true, animateRotate: true }
                }
            });
            
            legend.innerHTML = labels.map((l, i) => {
                const pct = ((values[i] / total) * 100).toFixed(1);
                return `<div class="legend-item"><div class="legend-color" style="background:${colors[i]}"></div><span>${l}</span><span class="legend-value">${values[i]} (${pct}%)</span></div>`;
            }).join('');
        }

        function updateQuestionCharts() {
            if (!isAdmin) return;
            questions.forEach(q => {
                const votes = {}; let total = 0;
                friends.forEach(f => { const c = getVoteCount(q.id, f.id); if(c>0){votes[f.name]=c; total+=c;} });
                const chart = questionCharts[q.id];
                if (!chart && total > 0) renderQuestionCharts();
                else if (chart) {
                    chart.data.labels = Object.keys(votes);
                    chart.data.datasets[0].data = Object.values(votes);
                    chart.update();
                }
            });
        }

        function addQuestion() {
            const text = document.getElementById('newQuestion').value.trim();
            const emoji = document.getElementById('newQuestionEmoji').value.trim() || '❓';
            if (!text) return alert('Асуулт бичнэ үү!');
            const newId = Math.max(...questions.map(q => q.id), 0) + 1;
            const newQ = { id: newId, text, emoji };
            
            db.ref(`questions/${newId}`).set(newQ).then(() => {
                questions.push(newQ);
                saveLocalData(); renderQuestions();
                if (isAdmin) refreshAdminView();
                document.getElementById('newQuestion').value = '';
                document.getElementById('newQuestionEmoji').value = '';
                alert('✅ Асуулт нэмэгдлээ!');
            }).catch(err => alert('❌ Алдаа: ' + err.message));
        }

        function resetAllVotes() {
            if (!confirm('Бүх vote-уудыг Firebase-с устгах уу?')) return;
            db.ref('votes').remove().then(() => {
                remoteCounts = {}; questions.forEach(q => { remoteCounts[q.id]={}; friends.forEach(f => remoteCounts[q.id][f.id]=0); });
                if (isAdmin) refreshAdminView();
                alert('✅ Бүх vote цэвэрлэгдлээ!');
            }).catch(e => alert('❌ Алдаа: '+e.message));
        }

        // 🚀 Initialization
        window.onload = async function() {
            await loadQuestions();
            loadLocalData();
            renderQuestions();
            firebaseInitialized = true;
            
            // Real-time listener for votes
            db.ref('votes').on('value', snap => {
                const data = snap.val() || {};
                questions.forEach(q => friends.forEach(f => {
                    const key = `${q.id}_${f.id}`;
                    remoteCounts[q.id][f.id] = Number(data[key]) || 0;
                }));
                if (firebaseInitialized && isAdmin) {
                    updateQuestionCharts();
                    refreshAdminView();
                }
            });

            db.ref('.info/connected').on('value', snap => updateConnectionStatus(snap.val()));
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') loadFirebaseVotes();
            });
        };
    </script>
</body>
</html>
