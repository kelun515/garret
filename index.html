<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garret - Найзуудаа expose хий</title>
    <meta http-equiv="Permissions-Policy" content="interest-cohort=()">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #1a1a1a; --bg-card: #242424;
            --text-primary: #ffffff; --text-secondary: #a0a0a0;
            --accent: #ff3366; --accent-hover: #ff1a4d; --success: #00d084; --border: #333333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-primary); color: var(--text-primary); overflow-x: hidden; min-height: 100vh;
        }
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./images/background.jpg'); background-size: cover;
            background-position: center; opacity: 0.1; z-index: -1;
        }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .landing {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; padding: 40px 20px; text-align: center;
        }
        .logo {
            font-size: 4.5rem; font-weight: 900;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 20px; letter-spacing: -3px;
        }
        .landing h1 { font-size: 2.2rem; margin-bottom: 15px; font-weight: 700; }
        .landing p { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 50px; }
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .btn {
            background: var(--accent); color: white; border: none; padding: 16px 40px;
            font-size: 1.1rem; border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: all 0.3s ease; box-shadow: 0 10px 30px rgba(255, 51, 102, 0.3);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 51, 102, 0.4); background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-card); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .btn-secondary:hover { box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); }
        .nav {
            position: fixed; top: 0; left: 0; right: 0; backdrop-filter: blur(20px);
            padding: 15px 25px; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .nav-logo { font-size: 1.8rem; font-weight: 900; color: var(--accent); cursor: pointer; }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none; font-weight: 500;
            transition: all 0.3s; padding: 8px 16px; border-radius: 20px; font-size: 0.95rem;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); background: var(--bg-card); }
        .container { max-width: 500px; margin: 0 auto; padding: 100px 20px 40px; min-height: 100vh; }
        .question-feed {
            position: relative; height: calc(100vh - 180px); overflow-y: auto;
            scroll-snap-type: y mandatory; scrollbar-width: none; padding-bottom: 80px;
        }
        .question-feed::-webkit-scrollbar { display: none; }
        .question-card {
            min-height: calc(100vh - 220px); background: var(--bg-card); border-radius: 24px;
            padding: 30px 25px; margin-bottom: 25px; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }
        .question-header { text-align: center; margin-bottom: 30px; }
        .question-emoji { font-size: 4.5rem; margin-bottom: 20px; display: block; }
        .question-text { font-size: 1.6rem; font-weight: 700; line-height: 1.4; color: var(--text-primary); }
        .question-number {
            display: inline-block; background: var(--accent); color: white;
            padding: 5px 15px; border-radius: 20px; font-size: 0.85rem;
            font-weight: 600; margin-bottom: 15px;
        }
        .friends-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .friend-card {
            background: var(--bg-secondary); border-radius: 16px; padding: 20px 15px;
            text-align: center; cursor: pointer; transition: all 0.3s ease;
            border: 2px solid transparent; position: relative;
        }
        .friend-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 8px 25px rgba(255, 51, 102, 0.2); }
        .friend-card.voted { border-color: var(--success); background: rgba(0, 208, 132, 0.1); }
        .friend-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px; overflow: hidden; flex-shrink: 0;
        }
        .friend-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .friend-avatar .avatar-initial, .leader-avatar .avatar-initial {
            font-weight: 700; color: white; line-height: 1;
        }
        .friend-avatar .avatar-initial { font-size: 1.8rem; }
        .friend-name { font-weight: 600; font-size: 0.95rem; color: var(--text-primary); }
        .vote-submit-section { scroll-snap-align: start; padding: 10px 0 48px; }
        .vote-submit-card {
            background: var(--bg-card); border-radius: 24px; padding: 28px 22px;
            border: 1px solid var(--border); text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        .vote-submit-hint { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 18px; line-height: 1.45; }
        .vote-submit-status { margin-top: 14px; font-size: 0.9rem; min-height: 1.3em; color: var(--text-secondary); }
        .vote-submit-status.ok { color: var(--success); }
        .vote-submit-status.err { color: #ff6b6b; }
        .vote-submit-btn:disabled { opacity: 0.65; cursor: wait; transform: none; }
        .vote-badge {
            position: absolute; top: 10px; right: 10px; background: var(--accent);
            color: white; width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; font-weight: 700; animation: popIn 0.3s ease;
        }
        .swipe-indicator {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--bg-card); padding: 12px 25px; border-radius: 30px;
            display: flex; align-items: center; gap: 10px; color: var(--text-secondary);
            font-size: 0.9rem; font-weight: 500; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border); animation: bounce 2s ease infinite; z-index: 100;
        }
        .swipe-indicator svg { width: 20px; height: 20px; }
        .leaderboard { display: none; }
        .leaderboard-section { margin-bottom: 35px; }
        .leaderboard-title { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-weight: 700; }
        .leader-item {
            display: flex; align-items: center; padding: 18px 20px; background: var(--bg-card);
            border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); transition: all 0.3s;
        }
        .leader-item:hover { transform: translateX(5px); border-color: var(--accent); }
        .leader-rank { font-size: 1.5rem; font-weight: 900; margin-right: 15px; width: 35px; text-align: center; }
        .leader-rank.gold { color: #FFD700; } .leader-rank.silver { color: #C0C0C0; } .leader-rank.bronze { color: #CD7F32; }
        .leader-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff6b6b);
            display: flex; align-items: center; justify-content: center;
            margin-right: 15px; overflow: hidden; flex-shrink: 0;
        }
        .leader-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .leader-avatar .avatar-initial { font-size: 1.25rem; }
        .leader-info { flex: 1; }
        .leader-name { font-weight: 600; margin-bottom: 4px; font-size: 1rem; }
        .leader-votes { color: var(--text-secondary); font-size: 0.85rem; }
        .leader-score { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
        .admin-panel { display: none; }
        .admin-login {
            max-width: 400px; margin: 80px auto; background: var(--bg-card);
            padding: 40px 30px; border-radius: 24px; border: 1px solid var(--border);
        }
        .admin-login h2 { text-align: center; margin-bottom: 30px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 14px 18px; background: var(--bg-secondary);
            border: 1px solid var(--border); border-radius: 12px;
            color: var(--text-primary); font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 25px 20px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .stat-value { font-size: 2.2rem; font-weight: 700; color: var(--accent); margin-bottom: 5px; }
        .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
        .admin-section { background: var(--bg-card); border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 1px solid var(--border); }
        .admin-section h3 { margin-bottom: 20px; font-size: 1.3rem; }
        .vote-list { max-height: 400px; overflow-y: auto; }
        .vote-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .vote-item:last-child { border-bottom: none; }
        .vote-question { font-weight: 600; margin-bottom: 5px; }
        .vote-stats { color: var(--text-secondary); font-size: 0.85rem; }
        .reset-btn { background: #ff4444; width: 100%; margin-top: 10px; }
        .reset-btn:hover { background: #cc0000; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0); } to { opacity: 1; transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-8px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-100px) scale(1.5); } }
        @media (max-width: 768px) {
            .logo { font-size: 3.5rem; } .landing h1 { font-size: 1.6rem; } .landing p { font-size: 1rem; }
            .btn { padding: 14px 30px; font-size: 1rem; } .question-text { font-size: 1.4rem; }
            .question-emoji { font-size: 3.5rem; } .friends-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .friend-card { padding: 18px 12px; } .friend-avatar { width: 50px; height: 50px; }
            .friend-avatar .avatar-initial { font-size: 1.5rem; } .container { padding: 90px 15px 40px; }
            .nav-links a { padding: 6px 12px; font-size: 0.85rem; }
        }
        .hidden { display: none !important; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .emoji-reaction {
            position: fixed; font-size: 2.5rem; pointer-events: none;
            animation: floatUp 1s ease forwards; z-index: 9999;
        }
        .admin-badge {
            background: var(--accent); color: white; padding: 3px 10px;
            border-radius: 12px; font-size: 0.75rem; font-weight: 700; margin-left: 8px;
        }
        #connectionStatus {
            position: fixed; top: 70px; right: 20px; padding: 8px 16px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 500; z-index: 999; display: none;
        }
        #connectionStatus.connected { background: var(--success); color: #000; display: block; }
        #connectionStatus.disconnected { background: #ff6b6b; color: white; display: block; }
    </style>
</head>

    <!-- 🔥 Firebase SDK -->

    <script>
        // 🔥 Firebase Configuration - REPLACE WITH YOUR ACTUAL VALUES
        const firebaseConfig = {
  apiKey: "AIzaSyBGTPmuwsIne5nFv5qcqgp3SLBFd31fLV4",

  databaseURL: "https://garret-9cbae-default-rtdb.firebaseio.com",
  projectId: "garret-9cbae",
  storageBucket: "garret-9cbae.firebasestorage.app",
  messagingSenderId: "405640770546",
  appId: "1:405640770546:web:dc6046322c95fd44bdf16b",
  measurementId: "G-P762PYMB8L"
};

        // 🔥 Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🔥 Global flags
        let firebaseListenerAttached = false;
        let remoteAvailable = false;

        // Data
        const MEMBER_IMG_DIR = 'images/';
        const friends = [
            { id: 1, name: 'Yesu', image: 'yesu.jpg' }, { id: 2, name: 'Tugsuu', image: 'tugsuu.jpg' },
            { id: 3, name: 'Turuu', image: 'turuu.jpg' }, { id: 4, name: 'Uulaa', image: 'uula.jpg' },
            { id: 5, name: 'Shinee', image: 'shinee.jpg' }, { id: 6, name: 'Maral', image: 'maral.jpg' },
            { id: 7, name: 'Maralgoo', image: 'maralgoo.jpg' }, { id: 8, name: 'Anu jijg', image: 'anu_jijg.jpg' },
            { id: 9, name: 'Anu tom', image: 'anu_tom.jpg' }, { id: 10, name: 'Nomin', image: 'nomin.jpg' },
            { id: 11, name: 'Sender', image: 'sender.jpg' }, { id: 12, name: 'Misheel', image: 'misheel.jpg' },
            { id: 13, name: 'Enguun', image: 'enguun.jpg' }, { id: 14, name: 'Enja', image: 'enja.jpg' }
        ];

        function memberAvatarSrc(friend) {
            const raw = (friend && friend.image) ? String(friend.image) : '';
            const file = raw.replace(/^.*[/\\]/, '').replace(/\.\.[\\/]/g, '');
            return file ? MEMBER_IMG_DIR + encodeURIComponent(file) : '';
        }

        function memberAvatarHtml(friend) {
            const src = memberAvatarSrc(friend);
            if (src) {
                const alt = String(friend.name || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;');
                return `<img src="${src}" alt="${alt}" loading="lazy">`;
            }
            const letter = ((friend.name || '').trim()[0] || '?').toUpperCase();
            return `<span class="avatar-initial" aria-hidden="true">${letter}</span>`;
        }

        let questions = [
            { id: 1, text: 'Хэн хамгийн хурдан согтдог нь вэ?', emoji: '🍺' },
            { id: 2, text: 'Хэн хамгийн ховдог нь вэ?', emoji: '🍕' },
            { id: 3, text: 'Хэн ex рүүгээ шөнө госту бичих магдлалтай вэ?', emoji: '📱' },
            { id: 4, text: 'Хэн хамгийн хөгжилтэй нь вэ?', emoji: '😂' },
            { id: 5, text: 'Хэн хамгийн dramatic нь вэ?', emoji: '🎭' },
            { id: 6, text: 'Хэн хамгийн хөлдүү нь вэ?', emoji: '🤨' },
            { id: 7, text: 'Group chat-ны буга ?', emoji: '💬' },
            { id: 8, text: 'Хэн хамгийн хэл ам нь гүйцэгдэхээргүй хэрүүлч нь вэ?', emoji: '🤬' },
            { id: 9, text: 'Хэн хамгийн халуухан нь вэ?', emoji: '🫦' },
            { id: 10, text: '24/7 Госту ', emoji: '🍻' },
            { id: 11, text: 'Хэн хамгийн хөөрхөн нь вэ?', emoji: '🌹' },
            { id: 12, text: 'Хэн хамгийн унтамхай нь вэ?', emoji: '😴' }
        ];

        let votes = {};
        let localSelectedVotes = {};
        let remoteCounts = {};
        let isAdmin = false;

        const LOCAL_VOTE_KEY = 'noballs_votes';
        const LOCAL_SELECTED_KEY = 'noballs_selected';
        const LOCAL_QUESTIONS_KEY = 'noballs_questions';
        const LOCAL_CLIENT_ID_KEY = 'noballs_client_id';
        const LOCAL_LAST_SUBMIT_KEY = 'noballs_last_submit';
        const SUBMIT_URL = '';
        const SUBMIT_KEY = '';

        // 🔥 Load votes from Firebase
        async function loadFirebaseVotes() {
            try {
                const snapshot = await db.ref('votes').once('value');
                const data = snapshot.val() || {};
                questions.forEach(q => {
                    friends.forEach(f => {
                        const key = `${q.id}_${f.id}`;
                        remoteCounts[q.id][f.id] = Number(data[key]) || 0;
                    });
                });
                remoteAvailable = true;
                updateConnectionStatus(true);
                console.log('✅ Firebase votes loaded');
            } catch (error) {
                console.warn('❌ Failed to load Firebase votes:', error);
                remoteAvailable = false;
                updateConnectionStatus(false);
            }
        }

        function updateConnectionStatus(connected) {
            const el = document.getElementById('connectionStatus');
            if (connected) {
                el.textContent = '🟢 Live sync';
                el.className = 'connected';
            } else {
                el.textContent = '🔴 Offline mode';
                el.className = 'disconnected';
            }
        }

        // Local Storage helpers
        function createEmptyVotes() {
            const empty = {};
            questions.forEach(q => { empty[q.id] = {}; friends.forEach(f => { empty[q.id][f.id] = 0; }); });
            return empty;
        }
        function createEmptySelectedVotes() {
            const selected = {};
            questions.forEach(q => { selected[q.id] = null; });
            return selected;
        }
        function loadData() {
            const savedVotes = localStorage.getItem(LOCAL_VOTE_KEY);
            const savedSelected = localStorage.getItem(LOCAL_SELECTED_KEY);
            const savedQuestions = localStorage.getItem(LOCAL_QUESTIONS_KEY);
            if (savedQuestions) questions = JSON.parse(savedQuestions);
            votes = createEmptyVotes();
            localSelectedVotes = createEmptySelectedVotes();
            remoteCounts = createEmptyVotes();
            if (savedVotes) {
                try {
                    const parsed = JSON.parse(savedVotes);
                    Object.keys(parsed).forEach(qid => {
                        if (!votes[qid]) return;
                        Object.keys(parsed[qid]).forEach(fid => {
                            if (votes[qid][fid] !== undefined) {
                                votes[qid][fid] = Number(parsed[qid][fid]) || 0;
                                if (votes[qid][fid] > 0) localSelectedVotes[qid] = Number(fid);
                            }
                        });
                    });
                } catch (e) { console.warn('Invalid saved votes', e); }
            }
            if (savedSelected) {
                try {
                    const parsed = JSON.parse(savedSelected);
                    Object.keys(parsed).forEach(qid => {
                        if (localSelectedVotes[qid] !== undefined) localSelectedVotes[qid] = Number(parsed[qid]);
                    });
                } catch (e) { console.warn('Invalid selected state', e); }
            }
        }
        function saveData() {
            localStorage.setItem(LOCAL_VOTE_KEY, JSON.stringify(votes));
            localStorage.setItem(LOCAL_SELECTED_KEY, JSON.stringify(localSelectedVotes));
            localStorage.setItem(LOCAL_QUESTIONS_KEY, JSON.stringify(questions));
        }

        // Navigation
        function showPage(pageName) {
            document.getElementById('landingPage').classList.add('hidden');
            document.getElementById('mainNav').classList.remove('hidden');
            document.getElementById('mainContainer').classList.remove('hidden');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            if (pageName === 'landing') {
                document.getElementById('landingPage').classList.remove('hidden');
                document.getElementById('mainNav').classList.add('hidden');
                document.getElementById('mainContainer').classList.add('hidden');
            } else if (pageName === 'feed') {
                document.getElementById('feedPage').classList.add('active');
                document.getElementById('nav-feed').classList.add('active');
            } else if (pageName === 'admin') {
                document.getElementById('adminPage').classList.add('active');
                document.getElementById('nav-admin').classList.add('active');
            }
        }

        // Render
        function renderQuestions() {
            const feed = document.getElementById('questionFeed');
            feed.innerHTML = '';
            questions.forEach((q, i) => feed.appendChild(createQuestionCard(q, i)));
            appendVoteSubmitFooter();
        }
        function appendVoteSubmitFooter() {
            const feed = document.getElementById('questionFeed');
            const footer = document.createElement('div');
            footer.className = 'vote-submit-section';
            footer.innerHTML = `
                <div class="vote-submit-card">
                    <p class="vote-submit-hint">Дууссаны дараа дарна уу.</p>
                    <button type="button" class="btn vote-submit-btn" id="submitVotesBtn">Submit</button>
                    <p class="vote-submit-status" id="submitVotesStatus" role="status"></p>
                </div>`;
            feed.appendChild(footer);
            document.getElementById('submitVotesBtn').addEventListener('click', submitVotes);
        }

        function getOrCreateClientId() {
            let id = localStorage.getItem(LOCAL_CLIENT_ID_KEY);
            if (!id) {
                id = (typeof crypto !== 'undefined' && crypto.randomUUID)
                    ? crypto.randomUUID() : `c_${Date.now()}_${Math.random().toString(36).slice(2,12)}`;
                localStorage.setItem(LOCAL_CLIENT_ID_KEY, id);
            }
            return id;
        }

        function buildVoteSubmissionPayload() {
            return {
                submittedAt: new Date().toISOString(),
                clientId: getOrCreateClientId(),
                selections: questions.map(q => {
                    const fid = localSelectedVotes[q.id];
                    const friend = fid ? friends.find(f => f.id === Number(fid)) : null;
                    return { questionId: q.id, questionText: q.text, emoji: q.emoji, friendId: fid, friendName: friend?.name };
                })
            };
        }

        async function submitVotes() {
            const btn = document.getElementById('submitVotesBtn');
            const statusEl = document.getElementById('submitVotesStatus');
            if (!btn || !statusEl) return;
            statusEl.classList.remove('ok','err');
            const url = (SUBMIT_URL||'').trim();
            if (!url) { statusEl.classList.add('err'); statusEl.textContent = 'Илгээх тохиргоо хийгээгүй байна.'; return; }
            const missing = questions.filter(q => localSelectedVotes[q.id] == null);
            if (missing.length > 0 && !confirm(`Чи ${missing.length} асуултад сонголт хийгээгүй байна. Гэсэн ч илгээх үү?`)) return;
            
            btn.disabled = true; statusEl.textContent = 'Илгээж байна...';
            try {
                const payload = buildVoteSubmissionPayload();
                const headers = { 'Content-Type': 'application/json' };
                const key = (SUBMIT_KEY||'').trim();
                if (key) { headers['apikey'] = key; headers['Authorization'] = `Bearer ${key}`; headers['Prefer'] = 'return=minimal'; }
                const res = await fetch(url, { method: 'POST', mode: 'cors', headers, body: JSON.stringify({ payload }) });
                if (!res.ok) throw new Error(await res.text().catch(()=>`HTTP ${res.status}`));
                localStorage.setItem(LOCAL_LAST_SUBMIT_KEY, payload.submittedAt);
                statusEl.classList.add('ok'); statusEl.textContent = 'Амжилттай илгээгдлээ ✅';
            } catch (err) {
                console.warn('Submit failed', err);
                statusEl.classList.add('err'); statusEl.textContent = 'Илгээхэд алдаа: ' + (err?.message || String(err));
            } finally { btn.disabled = false; }
        }

        function createQuestionCard(question, index) {
            const selected = localSelectedVotes[question.id];
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div class="question-header">
                    <span class="question-number">Асуулт ${index+1}</span>
                    <div class="question-emoji">${question.emoji}</div>
                    <div class="question-text">${question.text}</div>
                </div>
                <div class="friends-grid" id="friends-${question.id}">
                    ${friends.map(f => `
                        <div class="friend-card ${selected===f.id?'voted':''}" onclick="vote(${question.id},${f.id},event)">
                            <div class="friend-avatar">${memberAvatarHtml(f)}</div>
                            <div class="friend-name">${f.name}</div>
                            ${getVoteBadgeHtml(question.id, f.id)}
                        </div>`).join('')}
                </div>`;
            return card;
        }

        // Vote counting
        function getVoteCount(qid, fid) {
            const src = remoteAvailable ? remoteCounts : votes;
            return (src[qid]?.[fid]) ? Number(src[qid][fid]) : 0;
        }
        function getQuestionTotal(qid) {
            const src = remoteAvailable ? remoteCounts : votes;
            return Object.values(src[qid]||{}).reduce((s,v)=>s+Number(v||0),0);
        }
        function calculatePercentage(qid, fid) {
            const total = getQuestionTotal(qid);
            return total === 0 ? 0 : Math.round((getVoteCount(qid,fid)/total)*100);
        }
        function getVoteBadgeHtml(qid, fid) {
            const count = getVoteCount(qid, fid);
            if (!count) return '';
            return `<div class="vote-badge">${remoteAvailable ? count : calculatePercentage(qid,fid)+'%'}</div>`;
        }
        function updateAllVoteUI() { questions.forEach(q => updateVoteUI(q.id)); }
        function updateVoteUI(qid) {
            const container = document.getElementById(`friends-${qid}`);
            if (!container) return;
            container.querySelectorAll('.friend-card').forEach((card, idx) => {
                const f = friends[idx];
                const count = getVoteCount(qid, f.id);
                let badge = card.querySelector('.vote-badge');
                if (badge) badge.remove();
                if (count > 0) {
                    const div = document.createElement('div');
                    div.className = 'vote-badge';
                    div.textContent = remoteAvailable ? count : `${calculatePercentage(qid,f.id)}%`;
                    card.appendChild(div);
                }
                card.classList.toggle('voted', localSelectedVotes[qid] === f.id);
            });
        }

        // 🔥 Voting with Firebase
        // 🔐 LOCAL voting only - NO Firebase update until submit
function vote(questionId, friendId, event) {
    // Show emoji animation
    const emojis = ['🔥','💯','😂','🎯','✨','🎉'];
    createEmojiReaction(event.clientX, event.clientY, emojis[Math.floor(Math.random()*emojis.length)]);
    
    // ✅ FIXED: Use 'questionId' parameter, not 'question.id'
    localSelectedVotes[questionId] = friendId;
    
    // Save to localStorage so it persists across page refreshes
    saveLocalData();
    
    // Update UI to show green checkmark
    updateVoteUI(questionId);
    
    // Optional: Log for debugging
    // console.log(`Question ${questionId} selected: Friend ${friendId}`);
}

        function applyLocalVote(qid, prev, fid) {
            if (!votes[qid]) { votes[qid] = {}; friends.forEach(f => votes[qid][f.id]=0); }
            if (prev) votes[qid][prev] = Math.max(0, votes[qid][prev]-1);
            votes[qid][fid] = (votes[qid][fid]||0) + 1;
            saveData();
        }

        function createEmojiReaction(x,y,emoji) {
            const el = document.createElement('div');
            el.className = 'emoji-reaction'; el.textContent = emoji;
            el.style.left = x+'px'; el.style.top = y+'px';
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),1000);
        }

        // Admin
        function adminLogin() {
            if (document.getElementById('adminPassword').value === 'admin123') {
                isAdmin = true;
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('adminDashboard').classList.remove('hidden');
                updateAdminStats(); renderAdminLeaderboard();
            } else alert('❌ Буруу password!');
        }
        function adminLogout() {
            isAdmin = false;
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
        }
        function calculateTotalScores() {
            return friends.map(f => {
                let score=0, totalVotes=0;
                questions.forEach(q => { const v=getVoteCount(q.id,f.id); totalVotes+=v; score+=v; });
                return { friendId: f.id, score, votes: totalVotes };
            }).sort((a,b)=>b.score-a.score);
        }
        function renderAdminLeaderboard() {
            const container = document.getElementById('adminLeaderboard');
            container.innerHTML = '';
            calculateTotalScores().slice(0,5).forEach((s,idx) => {
                const f = friends.find(x=>x.id===s.friendId);
                const item = document.createElement('div'); item.className='leader-item';
                const rankClass = idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
                item.innerHTML = `
                    <div class="leader-rank ${rankClass}">#${idx+1}</div>
                    <div class="leader-avatar">${memberAvatarHtml(f)}</div>
                    <div class="leader-info">
                        <div class="leader-name">${f.name}</div>
                        <div class="leader-votes">${s.votes} vote авсан</div>
                    </div>
                    <div class="leader-score">${s.score}</div>`;
                container.appendChild(item);
            });
        }
        function updateAdminStats() {
            let total=0;
            questions.forEach(q => friends.forEach(f => total+=getVoteCount(q.id,f.id)));
            document.getElementById('totalVotes').textContent = total;
            document.getElementById('totalQuestions').textContent = questions.length;
            const list = document.getElementById('voteList'); list.innerHTML='';
            questions.forEach(q => {
                let top='', max=0;
                friends.forEach(f => { const c=getVoteCount(q.id,f.id); if(c>max){max=c;top=f.name;} });
                const item = document.createElement('div'); item.className='vote-item';
                item.innerHTML = `<div><div class="vote-question">${q.emoji} ${q.text}</div><div class="vote-stats">${max} votes - Top: ${top}</div></div>`;
                list.appendChild(item);
            });
        }
        function addQuestion() {
            const text = document.getElementById('newQuestion').value;
            const emoji = document.getElementById('newQuestionEmoji').value || '❓';
            if (!text) { alert('Асуулт бичнэ үү!'); return; }
            const newId = Math.max(...questions.map(q=>q.id))+1;
            questions.push({id:newId, text, emoji});
            votes[newId] = {}; friends.forEach(f => votes[newId][f.id]=0);
            saveData(); renderQuestions(); updateAdminStats(); renderAdminLeaderboard();
            document.getElementById('newQuestion').value=''; document.getElementById('newQuestionEmoji').value='';
            alert('✅ Асуулт нэмэгдлээ!');
        }
        function resetAllVotes() {
            if (!confirm('Бүх vote-уудыг цэвэрлэх үү?')) return;
            questions.forEach(q => { votes[q.id]={}; friends.forEach(f => votes[q.id][f.id]=0); });
            saveData(); renderQuestions(); updateAdminStats(); renderAdminLeaderboard();
            alert('✅ Бүх vote-ууд цэвэрлэгдлээ!');
        }

        // Init
        function init() {
            loadData();
            loadFirebaseVotes().then(() => {
                renderQuestions();
                if (remoteAvailable) { updateAdminStats(); renderAdminLeaderboard(); }
            });
            document.addEventListener('visibilitychange', async () => {
                if (document.visibilityState !== 'visible') return;
                await loadFirebaseVotes();
                if (remoteAvailable) { updateAllVoteUI(); updateAdminStats(); renderAdminLeaderboard(); }
            });
            // Connection status check
            db.ref('.info/connected').on('value', snap => {
                updateConnectionStatus(snap.val() === true);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
